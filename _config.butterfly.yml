# 导航栏
nav:
  logo: /img/cat.svg
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  留言板: /guestbook/ || fas fa-comment-dots
  关于: /about/ || fas fa-heart
  友链: /link/ || fas fa-link
  相册: /gallery/ || fas fa-images
  音乐: /music/ || fas fa-music
  影视: /movies/ || fas fa-video
  游戏: /games/ || fas fa-gamepad

# 社交
social:
  fab fa-github: https://github.com/SeaCat666 || Github || '#24292e'

# 图标
favicon: /img/favicon.ico

# 头像
avatar:
  img: /img/tx.jpg

# 背景图
disable_top_img: false
tag_img: /img/tags.jpg
category_img: /img/categories.png
archive_img: /img/home.jpg
default_top_img: /img/home.jpg
index_img: /img/home.jpg

# 各标签背景
tag_per_img:
  butterfly: /img/butterfly-icon.png
  hexo: /img/home.jpg

# 页脚背景
footer_img: false

# 网站背景（深海暗色主题）
background:
  - '#0d1117'

# 封面
cover:
  index_enable: false
  aside_enable: false
  archives_enable: false

# 错误图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 404
error_404:
  enable: true
  subtitle: '页面跑到深海里了 ~(>_<)~'
  background: /img/error-page.png

# 文章元信息
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# 首页副标题
subtitle:
  enable: true
  sub:
    - 愿我们彼此好在未来
    - 一只醒在深海的猫
    - 会早睡吗？
  # 打字特效（逐字显示副标题）
  effect: true
  source: false

index_layout: 3

index_post_content:
  method: 3
  length: 500

# 目录
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# 版权
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/SeaCat666
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏
reward:
  enable: true
  text: 老板大气！
  QR_code:
    - img: /img/wxskm.jpg
      link:
      text: 微信
    - img: /img/zfbskm.jpg
      link:
      text: 支付宝

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# 页脚
footer:
  owner:
    enable: true
    since: 2020
  copyright:
    enable: true
    version: true
  custom_text: 🐱 深海猫的私人领地 — 愿我们彼此好在未来

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 一只醒在深海的猫
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/SeaCat666
  card_announcement:
    enable: true
    content: 谁不是16岁小青年呢
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: true
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 12/25/2020 18:56:09

# 代码块
code_blocks:
  theme: ocean
  macStyle: true
  height_limit: 300
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: false

# 代码高亮
highlight:
  line_number: true
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: false

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# 阅读模式
readmode: true

# 搜索
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    unescape: true

# 分享
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# 评论 (Twikoo)
comments:
  use: Twikoo
  text: true
  lazyload: false
  count: true
  card_post_count: false
  # 在每个页面的评论区显示"来发第一条留言吧"
  # 留言板页面强制显示评论区
  # 其他页面按需显示

# Twikoo 评论
# https://github.com/imaegoo/twikoo
twikoo:
  # Twikoo 部署的 Vercel 域名（必填）
  envId: https://twikoo-deepseacat.vercel.app
  region:
  # 评论数作为页面浏览量
  visitor: true
  option:

# 不蒜子统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ======== SEO 相关配置 ========

# 百度统计（https://tongji.baidu.com）
baidu_analytics:

# Google Analytics（https://analytics.google.com）
google_analytics:

# Microsoft Clarity（热力图、用户行为录制，免费）
microsoft_clarity: x05keoal9a

# 站点验证（Google Search Console / Bing / Baidu / 其他）
# 填入对应的验证字符串即可自动注入到 <head>
site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  - name: baidu-site-verification
    content: codeva-14gaoQwRwM

# PWA（指向存在的文件）
pwa:
  enable: false
  manifest: /img/favicon.png
  apple_touch_icon: /img/猫.png
  favicon_32_32: /img/favicon.png
  favicon_16_16: /img/favicon.png
  mask_icon: /img/favicon.png

# 代码注入
inject:
  head:
    - |
      <style>
      /* ══════════════════════════════════════════
         深海暗色主题
         ══════════════════════════════════════════ */

      /* - 基底 - */
      body {
        background: #0d1117 !important;
        color: #c9d1d9 !important;
      }

      /* - 全局卡片 - */
      .card-widget,
      #recent-posts > .recent-post-item,
      #aside-content .card-widget,
      .article-sort-item,
      #post,
      #page,
      #archive,
      #category,
      #tag,
      .recent-posts .recent-post-item,
      .flink-list-item {
        background: #161b22 !important;
        border: 1px solid #30363d !important;
        box-shadow: 0 1px 3px rgba(0,0,0,.3) !important;
      }

      /* - 导航栏 - */
      #nav {
        background: rgba(22,27,34,.88) !important;
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #30363d !important;
      }
      #nav .menus_items .menus_item > a {
        color: #c9d1d9 !important;
      }
      #nav .menus_items .menus_item > a:hover {
        color: #6b9cc4 !important;
      }

      /* - Logo 发光背景（解决灰色图标在暗色导航看不清） - */
      .site-icon,
      .nav-site-title img {
        filter: drop-shadow(0 0 4px rgba(255,255,255,.3)) !important;
        background: rgba(255,255,255,.12) !important;
        border-radius: 50% !important;
        padding: 4px !important;
      }
      #site-name,
      #site-title,
      #site-subtitle {
        color: #c9d1d9 !important;
      }

      /* - 内容文字 - */
      #article-container,
      .post-content,
      .article-sort-item-info,
      .recent-post-info,
      #post-info,
      p, li, span, div {
        color: #c9d1d9;
      }

      /* - 链接 - */
      a:not(.social-icon):not(.menus_item_link):not([class*="toc"]) {
        color: #6b9cc4 !important;
      }

      /* - 标题 - */
      h1, h2, h3, h4, h5, h6,
      .article-title, .recent-posts > .recent-post-item > .recent-post-info > .article-title {
        color: #e6edf3 !important;
      }

      /* - 页脚 - */
      #footer {
        background: transparent !important;
        color: #8b949e !important;
      }
      #footer-wrap,
      #footer-wrap a {
        color: #8b949e !important;
      }
      #footer-wrap a:hover {
        color: #6b9cc4 !important;
      }

      /* - 侧边栏卡片标题 - */
      .card-widget .item-headline {
        color: #e6edf3 !important;
      }

      /* - 标签云 - */
      .tag-cloud a {
        color: #c9d1d9 !important;
        background: #21262d !important;
        border: 1px solid #30363d !important;
      }
      .tag-cloud a:hover {
        background: #30363d !important;
        color: #6b9cc4 !important;
      }

      /* - 代码块 - */
      figure.highlight {
        background: #0d1117 !important;
        border: 1px solid #30363d !important;
      }

      /* - 分割线/元信息 - */
      .post-meta,
      .post-meta span,
      .post-meta a,
      .article-meta,
      .article-meta-wrap,
      .article-meta span,
      .article-meta a,
      .article-header .article-meta {
        color: #8b949e !important;
      }
      .article-meta a:hover,
      .post-meta a:hover {
        color: #6b9cc4 !important;
      }

      /* - 评论区 - */
      .twikoo .el-textarea__inner,
      .twikoo .tk-comments-container,
      #twikoo .tk-comment {
        background: #161b22 !important;
        color: #c9d1d9 !important;
        border-color: #30363d !important;
      }

      /* - 分页 - */
      .pagination .page-number,
      .pagination .extend {
        background: #21262d !important;
        color: #c9d1d9 !important;
        border: 1px solid #30363d !important;
      }
      .pagination .current {
        background: #6b9cc4 !important;
        color: #fff !important;
      }

      /* - 搜索 - */
      #local-search .search-dialog,
      #search-box,
      #local-search-input {
        background: #161b22 !important;
        color: #c9d1d9 !important;
        border-color: #30363d !important;
      }

      /* - 图片平滑加载 - */
      .reward-main img,
      #post img,
      .article-sort-item img,
      .tag-cloud a img,
      #recent-posts img,
      #page img {
        filter: none !important;
        transition: opacity 0.4s ease, transform 0.3s ease !important;
      }
      /* 打赏二维码样式 */
      #reward .reward-main .reward-all .reward-item img {
        border-radius: 12px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
        transition: transform 0.3s ease, box-shadow 0.3s ease !important;
      }
      #reward .reward-main .reward-all .reward-item img:hover {
        transform: scale(1.05) !important;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important;
      }
      @keyframes rewardFadeIn {
        from { opacity: 0; transform: scale(0.9) translateY(10px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      #reward .reward-main .reward-all .reward-item {
        animation: rewardFadeIn 0.35s ease-out both !important;
      }
      #reward .reward-main .reward-all .reward-item:nth-child(1) { animation-delay: 0.05s; }
      #reward .reward-main .reward-all .reward-item:nth-child(2) { animation-delay: 0.15s; }
      </style>
  bottom:
    - <div class="aplayer no-destroy" data-id="2013698413" data-server="netease" data-type="playlist" data-fixed="true" data-autoplay="false" data-order="random" data-volume="0.7" data-mutex="true" data-theme="#6b9cc4"></div>
    - |
      <script>
      // 访问者 IP 与城市显示
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const cardWebinfo = document.querySelector('.card-webinfo')
          if (!cardWebinfo) return
          const container = cardWebinfo.querySelector('.webinfo') || cardWebinfo
          const ipItem = document.createElement('div')
          ipItem.className = 'webinfo-item'
          ipItem.innerHTML = '<div class="item-name">🖥 你的位置 :</div><div class="item-count" id="visitor-location">加载中…</div>'
          container.appendChild(ipItem)
          fetch('/api/ip')
            .then(r => r.json())
            .then(d => {
              const loc = document.getElementById('visitor-location')
              if (d && d.city) loc.innerHTML = d.country + ' · ' + d.city
              else loc.innerHTML = '未知'
            })
            .catch(() => { document.getElementById('visitor-location').innerHTML = '未知' })
        }, 300)
      })
        }, 300)
      })
        }
        setTimeout(() => tryFetch([
          'https://freeipapi.com/api/json',
          'https://ipwhois.app/json/?lang=zh-CN',
          'https://geolocation-db.com/json/'
        ]), 200)
      })
      // 文章点赞
      ;(() => {
        const addLikeBtn = () => {
          const article = document.querySelector('#post')
          if (!article || article.querySelector('.post-like-btn')) return
          const footer = article.querySelector('.post-copyright') || article.querySelector('.tag_share')
          if (!footer) return
          const postKey = window.location.pathname.replace(/\/$/, '')
          const liked = localStorage.getItem('liked_' + postKey)
          const btn = document.createElement('div')
          btn.className = 'post-like-btn'
          btn.style.cssText = 'text-align:center;margin:20px 0;font-size:1em'
          btn.innerHTML = liked
            ? '<span style="color:#6b9cc4;font-size:1.5rem">❤️</span><br><span style="color:#999">已点赞</span>'
            : '<button onclick="window.likePost(this)" style="background:#6b9cc4;color:#fff;border:none;padding:10px 30px;border-radius:30px;cursor:pointer;font-size:1.1rem;transition:all .3s">❤️ 点赞这篇文章</button>'
          footer.parentNode.insertBefore(btn, footer.nextSibling)
        }
        window.likePost = function(btn) {
          const postKey = window.location.pathname.replace(/\/$/, '')
          localStorage.setItem('liked_' + postKey, '1')
          btn.closest('.post-like-btn').innerHTML = '<span style="color:#6b9cc4;font-size:1.5rem">❤️</span><br><span style="color:#999">已点赞</span>'
        }
        window.addEventListener('load', addLikeBtn)
        window.pjax && document.addEventListener('pjax:complete', addLikeBtn)
      })()
      </script>

# 主题色（暗色深海风，覆盖 Butterfly 蓝色默认值）
theme_color:
  enable: true
  main: "#6b9cc4"
  paginator: "#6b9cc4"
  button_hover: "#8bb8ea"
  text_selection: "#6b9cc4"
  link_color: "#8b949e"
  meta_color: "#8b949e"
  hr_color: "#30363d"
  code_foreground: "#c9d1d9"
  code_background: "rgba(255,255,255,.05)"
  toc_color: "#6b9cc4"
  blockquote_padding_color: "#30363d"
  blockquote_background_color: "#161b22"
  scrollbar_color: "#30363d"
  meta_theme_color_light: "0d1117"
  meta_theme_color_dark: "0d1117"

# 其他
rounded_corners_ui: true
mask:
  header: true
  footer: true
enter_transitions: true
display_mode: light
hr_icon:
  enable: true
  icon: '\f0c5'
  icon_top: '\f0c5'
lazyload:
  enable: true
  native: true
  field: site
  placeholder:
  blur: false
Open_Graph_meta:
  enable: true
  option:
    twitter_card: summary_large_image
    twitter_image: /img/home.jpg

# 分类/标签页 UI 样式（index = 卡片首页风格）
category_ui: index
tag_ui: index

# URL 锚点自动更新
anchor:
  auto_update: true
  click_to_scroll: true

# 图片 figcaption
photofigcaption: true

# 两端对齐
text_align_justify: true

# 数学公式（KaTeX）
math:
  use: katex
  per_page: true
  hide_scrollbar: false
  katex:
    copy_tex: true

# ABC 音乐符号
abcjs:
  enable: true
  per_page: true

# 首页头像区域高度
# index_site_info_top: 300px
# index_top_img_height: 600px

# 分类页独立背景图（可后续添加各分类图片）
category_per_img:

# 右下角按钮位置
rightside_bottom: 100px

# ======== 性能优化配置 ========

# 加载动画（开启后页面加载时有 loading 效果）
preloader:
  enable: true
  source: 1

# 打字特效（输入时屏幕震动效果）
activate_power_mode:
  enable: false

# 背景特效 - 粒子网络背景（蓝色系，配合主题色）
canvas_ribbon:
  enable: false
canvas_fluttering_ribbon:
  enable: false
canvas_nest:
  enable: true
  color: '100,200,255'
  opacity: 0.5
  zIndex: -1
  count: 99

# 鼠标点击特效
fireworks:
  enable: false
click_heart:
  enable: true
  mobile: true
clickShowText:
  enable: true
  text:
    - ❤️
    - 🐱
    - 加油
  fontSize: 20px
  random: true
  mobile: true

# 文章美化（保留）
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0f6'
  title_prefix_icon_color: '#6b9cc4'

# CDN 配置（所有资源本地加载，避免 jsDelivr 国内被屏蔽）
CDN:
  internal_provider: local
  third_party_provider: local
  version: true

# Toast 通知（关闭以减少额外 JS/CSS 请求）
snackbar:
  enable: false

# PJAX（页面无刷新跳转）
pjax:
  enable: true
  exclude:
    # - /music/

# APlayer 全局注入（音乐播放器 CSS/JS）
aplayerInject:
  enable: true
  per_page: true

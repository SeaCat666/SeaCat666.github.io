# 导航栏
nav:
  logo: /img/cat.png
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart
  友链: /link/ || fas fa-link

# 社交
social:
  fab fa-github: https://github.com/SeaCat666 || Github || '#24292e'

# 图标
favicon: /img/favicon.ico

# 头像
avatar:
  img: /img/avatar.png
  effect: false

# 背景图
disable_top_img: false
tag_img: /img/tags.webp
category_img: /img/categories.webp
archive_img: /img/home.webp
default_top_img: /img/home.webp
index_img: /img/home.webp

# 各标签背景
tag_per_img:
  butterfly: /img/butterfly-icon.webp
  hexo: /img/home.webp

# 页脚背景
footer_img: false

# 网站背景
background:
  - '#f7f7f7'

# 封面
cover:
  index_enable: false
  aside_enable: false
  archives_enable: false

# 错误图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.webp

# 404
error_404:
  enable: true
  subtitle: '页面跑到深海里了 ~(>_<)~'
  background: /img/error-page.png

# 文章元信息
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# 首页副标题
subtitle:
  enable: true
  sub:
    - 愿我们彼此好在未来
    - 一只醒在深海的猫
    - 会早睡吗？
  effect: false
  source: false

index_layout: 3

index_post_content:
  method: 3
  length: 500

# 目录
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# 版权
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/SeaCat666
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏
reward:
  enable: true
  text: 老板大气！
  QR_code:
    - img: /img/wxskm.webp
      link:
      text: 微信
    - img: /img/zfbskm.webp
      link:
      text: 支付宝

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# 页脚
footer:
  owner:
    enable: true
    since: 2020
  copyright:
    enable: true
    version: true
  custom_text: 🐱 深海猫的私人领地 — 愿我们彼此好在未来

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 一只醒在深海的猫
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/SeaCat666
  card_announcement:
    enable: true
    content: 谁不是16岁小青年呢
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: true
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 12/25/2020 18:56:09

# 代码块
code_blocks:
  theme: light
  macStyle: true
  height_limit: 300
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: false

# 代码高亮
highlight:
  line_number: true
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: false

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# 阅读模式
readmode: true

# 搜索
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    unescape: true

# 分享
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# 评论 (Twikoo)
comments:
  use: Twikoo
  text: true
  lazyload: false
  count: true
  card_post_count: false

# Twikoo 评论
# https://github.com/imaegoo/twikoo
twikoo:
  # Twikoo 部署的 Vercel 域名（必填）
  envId: https://twikoo-deepseacat.vercel.app
  region:
  # 评论数作为页面浏览量
  visitor: true
  option:

# 不蒜子统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# 代码注入
inject:
  head:
  bottom:
    - <div class="aplayer no-destroy" data-id="2013698413" data-server="netease" data-type="playlist" data-fixed="true" data-autoplay="false" data-order="random" data-volume="0.7" data-mutex="true" data-theme="#49B1F5"></div>

# 其他
rounded_corners_ui: true
mask:
  header: true
  footer: true
enter_transitions: true
display_mode: light
hr_icon:
  enable: true
  icon: '\f0c5'
  icon_top: '\f0c5'
lazyload:
  enable: true
  native: true
  field: site
  blur: true
Open_Graph_meta:
  enable: true
  option:
    twitter_card: summary_large_image
    twitter_image: /img/home.webp

# 分类/标签页 UI 样式（index = 卡片首页风格）
category_ui: index
tag_ui: index

# URL 锚点自动更新
anchor:
  auto_update: true
  click_to_scroll: true

# 图片 figcaption
photofigcaption: true

# 两端对齐
text_align_justify: true

# 数学公式（KaTeX）
math:
  use: katex
  per_page: true
  hide_scrollbar: false
  katex:
    copy_tex: true

# ABC 音乐符号
abcjs:
  enable: true
  per_page: true

# 首页头像区域高度
# index_site_info_top: 300px
# index_top_img_height: 600px

# 分类页独立背景图（可后续添加各分类图片）
category_per_img:

# 右下角按钮位置
rightside_bottom: 100px

# ======== 性能优化配置 ========

# 加载动画（关闭以减少白屏等待）
preloader:
  enable: false

# 打字特效
activate_power_mode:
  enable: false

# 背景特效 - 全部关闭以提升加载速度
canvas_ribbon:
  enable: false
canvas_fluttering_ribbon:
  enable: false
canvas_nest:
  enable: false

# 鼠标点击特效
fireworks:
  enable: false
click_heart:
  enable: false
clickShowText:
  enable: false

# 文章美化（保留）
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0f6'
  title_prefix_icon_color: '#49B1F5'

# CDN 配置（所有资源本地加载，避免 jsDelivr 国内被屏蔽）
CDN:
  internal_provider: local
  third_party_provider: local
  version: true

# Toast 通知（关闭以减少额外 JS/CSS 请求）
snackbar:
  enable: false

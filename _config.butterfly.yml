# 导航栏
nav:
  logo: /img/favicon.png
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart
  友链: /link/ || fas fa-link

# 社交
social:
  fab fa-github: https://github.com/SeaCat666 || Github || '#24292e'

# 图标
favicon: /img/favicon.png

# 头像
avatar:
  img: https://avatars.githubusercontent.com/u/70735741?v=4
  effect: false

# 背景图
disable_top_img: false
tag_img: /img/tags.jpg
category_img: /img/categories.png
archive_img: /img/home.jpg
default_top_img: /img/home.jpg
index_img: /img/home.jpg

# 各标签背景
tag_per_img:
  butterfly: /img/butterfly-icon.png
  hexo: /img/home.jpg

# 页脚背景
footer_img: false

# 网站背景
background:
  - '#f7f7f7'

# 封面
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true

# 错误图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 404
error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: /img/error-page.png

# 文章元信息
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# 首页副标题
subtitle:
  enable: true
  sub:
    - 愿我们彼此好在未来
    - 一只醒在深海的猫
    - 会早睡吗？
  effect: true
  source: false

index_layout: 3

index_post_content:
  method: 3
  length: 500

# 目录
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# 版权
post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# 页脚
footer:
  owner:
    enable: true
    since: 2020
  copyright:
    enable: true
    version: true
  custom_text:

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 一只醒在深海的猫
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/SeaCat666
  card_announcement:
    enable: true
    content: 🐱 欢迎来到深海猫的博客～<br>记录编程、折腾和生活<br>愿我们彼此好在未来
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: true
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 12/25/2020 18:56:09

# 代码块
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# 代码高亮
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# 阅读模式
readmode: true

# 搜索
search:
  use: local_search
  placeholder: 搜索文章...

# 分享
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# 评论 (暂无)
comments:
  use:
  text: true
  lazyload: false
  count: false

# 不蒜子统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# 代码注入
inject:
  head:
  bottom:

# 其他
rounded_corners_ui: true
mask:
  header: true
  footer: true
enter_transitions: true
display_mode: light
hr_icon:
  enable: true
lazyload:
  enable: true
  native: true
  field: site
Open_Graph_meta:
  enable: true

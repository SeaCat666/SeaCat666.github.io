# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: 深海猫
subtitle: '愿我们彼此好在未来'
description: '会早睡吗？'
keywords: 深海猫
author: 深海猫
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://www.deepseacat.cn
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
# Include hidden files (e.g. .nojekyll for GitHub Pages)
include:
  - .nojekyll

skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: butterfly

# Sitemap
sitemap:
  path:
    - sitemap.xml
    - sitemap.txt

# Deployment
deploy:
  type: git
  repo: https://github.com/SeaCat666/SeaCat666.github.io.git
  branch: master
  ignore_hidden: false
